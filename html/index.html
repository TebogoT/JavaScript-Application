<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Menu</h1>  
    </header>
    <main>
        <h2>Request an order from the chef</h2>

        <form id="order-form">
            <label for="ingredient">Ingredient:</label>
            <input type="text" id="ingredient" name="ingredient" placeholder="please enter an ingredient" required>
            <button id="order-button" type="submit">Order</button>
            <p id="meal-message"></p>
            <ul id="meal-gallery">
                <!-- Meals will be added here -->
            </ul>
        </form>
        <section>
            <button id="view-incomplete-orders">View Incomplete Orders</button>
            <button id="complete-order">Complete an Order</button>
        </section>
    </main> 
    
    
    <script src="../js/index.js"></script>
    
</body>
</html>
