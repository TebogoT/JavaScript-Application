<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Menu</h1>  
    </header>
    <main>
        <h2>Request an order from the chef</h2>

        <form id="order-form">
            <label for="ingredient">Ingredient:</label>
            <input type="text" id="ingredient" name="ingredient" placeholder="please enter an ingredient" required>
            <button id="order-button" type="submit">Order</button>
            <p id="meal-message"></p>
            <ul id="meal-gallery">
                <!-- Meals will be added here -->
            </ul>
        </form>
    
        <section id="order-management">
            <div id="incomplete-orders">
                <h3>Incomplete Orders</h3>
                <ul id="incomplete-orders-list">
                    <!-- Incomplete orders will be listed here -->
                </ul>
            </div>
            <div id="completed-orders">
                <h3>Completed Orders</h3>
                <ul id="completed-orders-list">
                    <!-- Completed orders will be listed here -->
                </ul>
                <button id="mark-complete">Mark Incomplete Orders as Completed</button>
            </div>
        </section>
    </main> 
    
    <script src="../js/index.js"></script>
    
</body>
</html>
